spring:
  application:
    name: hello-gemini
  ai:
    google:
      genai:
        # Gemini Developer API mode (free tier).
        # Only set api-key here; do NOT set project-id or location
        # — those switch the client to paid Vertex AI mode.
        api-key: ${GEMINI_API_KEY}
        chat:
          options:
            model: gemini-2.5-flash
            max-output-tokens: 1024
            temperature: 0.7

server:
  port: 8080

logging:
  level:
    org.springframework.ai: INFO
